<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B-13 A-05</title>


  <link rel="stylesheet" href="./style.css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>
  
    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 mx-auto items-center justify-center my-auto mt-14">
      
      <div>
        <img class="items-center mx-auto"  src="./assets/github-logo.png" alt="">
        <p class="font-bold text-2xl text-center pt-4">GitHub Issues Tracker</p>
        <p class="text-gray-600 text-center text-[16px]">Sign in to manage your issues</p>
      </div>
      <label class="label text-[18px]">Username</label>
      <input type="email" class="input" placeholder="Enter Username" />
      <label class="text-blue-600">Default: admin</label>

      <label class="label text-[18px]">Password</label>
      <input type="password" class="input" placeholder="Password" />
      <label class="text-blue-600">Default: admin123</label>

      <button class="btn  btn-primary mt-4 ">Login</button>

      <div>
        <div class="flex items-center gap-1 ">
          <div class="h-0.5 bg-gray-400 w-[42%] mx-auto"></div>
          <p class="font-bold">OR</p>
          <div class="h-0.5 bg-gray-400 w-[42%] mx-auto"></div>
        </div>

        <div  class=" flex flex-col items-center mx-auto py-2 text-[16px]">
          <p>Demo Credentials:</p>
          <p><span class="font-bold">Username:</span> admin</p>
          <p><span class="font-bold">Password:</span> admin123</p>
        </div>
      </div>
    </fieldset>
  

</body>

</html>
