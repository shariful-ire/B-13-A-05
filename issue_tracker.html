<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker Dashboard</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <section>
        <div class="navbar bg-base-100 shadow-sm flex-wrap h-auto gap-7 justify-between">
            <div class="flex  items-center">
                <img class="h-[60px]" src="./assets/github-logo.png" alt="">
                <a class="btn btn-ghost text-2xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2 items-center">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <div class="">

                    <div class="w-auto p-4 ">
                        <button class="btn btn-primary">Search</button>
                    </div>


                </div>
            </div>
        </div>
    </section>

    <section class=" w-[80%] mx-auto my-10 bg-gray-200 items-center py-10">
        
            <div class="flex gap-[25px] bg-white items-center  mb-4  px-6">
                <button id="all" class="btn btn-primary my-4">All</button>
                <button id="open" class="btn btn-primary my-4">Open</button>
                <button id="closed" class="btn btn-primary my-4">Closed</button>
            </div>

            <div class="flex justify-between h-auto flex-wrap px-3  bg-white">
                <div class="flex gap-3.5 text-gray-500">
                    <img src="./assets/Aperture.png" alt="">
                    <div class="">
                        <p id="issue-text">
                            
                        </p>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                <div id="status" class="flex gap-5 items-center p-4">
                    <span class="flex items-center"><img class="h-[16px] items-center" src="./assets/Open-Status.png" alt="">Open</span>
                    <span class="flex items-center"><img class="h-[16px] items-center" src="./assets/Closed-Status .png" alt="">Closed</span>
                </div>
            </div>


            <div id="card">
                <p>Here card Will Created By the dynamic js </p>
            </div>
        
    </section>

    <script src="./script.js"></script>
</body>

</html>
